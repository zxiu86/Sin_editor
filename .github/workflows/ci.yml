name: SIN Editor CI (Android Only)

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

# Cancel previous runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
#  Shared versions
# ─────────────────────────────────────────────────────────────────────────────
env:
  NDK_VERSION:      "25.2.9519653"
  BUILD_TOOLS_VER:  "33.0.2"
  COMPILE_SDK:      "33"
  MIN_SDK:          "21"

# =============================================================================
jobs:

# ─────────────────────────────────────────────────────────────────────────────
#  Android APK Build
# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build — Android APK
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /opt/android-sdk
      TARGET_ABI:       "arm64-v8a"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android SDK command-line tools
        run: |
          sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip                -O /tmp/cmdtools.zip
          sudo unzip -q /tmp/cmdtools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          sudo mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools                   $ANDROID_SDK_ROOT/cmdline-tools/latest

      - name: Accept SDK licenses & install packages
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager             "platform-tools"             "platforms;android-${{ env.COMPILE_SDK }}"             "build-tools;${{ env.BUILD_TOOLS_VER }}"             "ndk;${{ env.NDK_VERSION }}"

      - name: Build native library with CMake
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          cmake -B build-android                 -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake"                 -DANDROID_ABI=${{ env.TARGET_ABI }}                 -DANDROID_PLATFORM=android-${{ env.MIN_SDK }}                 -DANDROID_STL=c++_shared                 -DCMAKE_BUILD_TYPE=Release

          cmake --build build-android --parallel

      - name: Create APK structure
        run: |
          mkdir -p apk-staging/lib/${{ env.TARGET_ABI }}
          mkdir -p apk-staging/assets

          cp build-android/libsineditor_engine.so              apk-staging/lib/${{ env.TARGET_ABI }}/

          cat > apk-staging/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.sineditor.app"
              android:versionCode="3"
              android:versionName="0.3">

              <uses-sdk
                  android:minSdkVersion="21"
                  android:targetSdkVersion="33" />

              <uses-feature android:glEsVersion="0x00020000" android:required="true" />

              <application
                  android:label="SIN Editor"
                  android:hasCode="false">

                  <activity
                      android:name="android.app.NativeActivity"
                      android:label="SIN Editor"
                      android:screenOrientation="unspecified"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:exported="true">

                      <meta-data
                          android:name="android.app.lib_name"
                          android:value="sineditor_engine" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

      - name: Package APK with aapt2
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          PLATFORM="$ANDROID_SDK_ROOT/platforms/android-${{ env.COMPILE_SDK }}"

          mkdir -p apk-staging/res
          $BUILD_TOOLS/aapt2 compile --dir apk-staging/res -o compiled_res.zip || true

          $BUILD_TOOLS/aapt2 link               -o sin_editor_unsigned.apk               --manifest apk-staging/AndroidManifest.xml               -I "$PLATFORM/android.jar"               --min-sdk-version ${{ env.MIN_SDK }}               --target-sdk-version ${{ env.COMPILE_SDK }}               --version-code 3               --version-name "0.3"

          cd apk-staging
          zip -r ../sin_editor_unsigned.apk lib/
          cd ..

      - name: Align APK
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          $BUILD_TOOLS/zipalign -v 4 sin_editor_unsigned.apk sin_editor_aligned.apk

      - name: Sign APK with debug key
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"

          keytool -genkeypair             -keystore debug.keystore             -alias androiddebugkey             -keypass android             -storepass android             -keyalg RSA             -keysize 2048             -validity 10000             -dname "CN=Android Debug,O=Android,C=US"             -noprompt

          $BUILD_TOOLS/apksigner sign             --ks debug.keystore             --ks-key-alias androiddebugkey             --ks-pass pass:android             --key-pass pass:android             --out sin_editor_debug.apk             sin_editor_aligned.apk

      - name: Verify APK
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          $BUILD_TOOLS/apksigner verify --verbose sin_editor_debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sin_editor-android-arm64-v0.3
          path: sin_editor_debug.apk
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
#  Release — bundle artifact
# ─────────────────────────────────────────────────────────────────────────────
  release-bundle:
    name: Release Bundle
    runs-on: ubuntu-22.04
    needs: build-android
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sin_editor-android-arm64-v0.3
          path: dist/

      - name: List dist contents
        run: find dist/ -type f | sort

      - name: Create release archive
        run: |
          cd dist
          zip -r ../sin_editor_release_${{ github.sha }}.zip .

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: sin_editor-release-${{ github.sha }}
          path: sin_editor_release_${{ github.sha }}.zip
          retention-days: 90
