name: SIN Editor CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

# Cancel previous runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
#  Shared versions
# ─────────────────────────────────────────────────────────────────────────────
env:
  CMAKE_VERSION: "3.28.0"
  RAYLIB_TAG: "5.0"

# =============================================================================
jobs:

# ─────────────────────────────────────────────────────────────────────────────
#  Linux Desktop
# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build — Linux (Desktop)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev

      - name: Cache CMake / Raylib FetchContent
        uses: actions/cache@v4
        with:
          path: |
            ~/.cmake
            build/_deps
          key: linux-fetchcontent-raylib-${{ env.RAYLIB_TAG }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            linux-fetchcontent-raylib-${{ env.RAYLIB_TAG }}-

      - name: Configure
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sin_editor-linux-x86_64
          path: build/sin_editor
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
#  Windows Desktop
# ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows (Desktop)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CMake / Raylib FetchContent
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            C:/Users/runneradmin/.cmake
          key: windows-fetchcontent-raylib-${{ env.RAYLIB_TAG }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            windows-fetchcontent-raylib-${{ env.RAYLIB_TAG }}-

      - name: Configure
        run: |
          cmake -B build `
                -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sin_editor-windows-x86_64
          path: build/Release/sin_editor.exe
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
#  Android APK
# ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build — Android APK
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /opt/android-sdk
      NDK_VERSION:      "25.2.9519653"
      BUILD_TOOLS_VER:  "33.0.2"
      COMPILE_SDK:      "33"
      MIN_SDK:          "21"
      TARGET_ABI:       "arm64-v8a"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android SDK command-line tools
        run: |
          sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
               -O /tmp/cmdtools.zip
          sudo unzip -q /tmp/cmdtools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          sudo mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools \
                  $ANDROID_SDK_ROOT/cmdline-tools/latest

      - name: Accept SDK licenses & install packages
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${{ env.COMPILE_SDK }}" \
            "build-tools;${{ env.BUILD_TOOLS_VER }}" \
            "ndk;${{ env.NDK_VERSION }}"

      - name: Build native library with CMake
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          cmake -B build-android \
                -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake" \
                -DANDROID_ABI=${{ env.TARGET_ABI }} \
                -DANDROID_PLATFORM=android-${{ env.MIN_SDK }} \
                -DANDROID_STL=c++_shared \
                -DCMAKE_BUILD_TYPE=Release \
                -DUSE_EXTERNAL_GLFW=OFF \
                -DGLFW_BUILD_X11=OFF \
                -DGLFW_BUILD_WAYLAND=OFF \
                -DUSE_AUDIO=OFF

          cmake --build build-android --parallel

      - name: Create APK structure
        run: |
          mkdir -p apk-staging/lib/${{ env.TARGET_ABI }}
          mkdir -p apk-staging/assets

          cp build-android/libsin_editor.so \
             apk-staging/lib/${{ env.TARGET_ABI }}/

          cat > apk-staging/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.sineditor.app"
              android:versionCode="1"
              android:versionName="0.2">

              <uses-sdk
                  android:minSdkVersion="21"
                  android:targetSdkVersion="33" />

              <uses-feature android:glEsVersion="0x00020000" android:required="true" />

              <application
                  android:label="SIN Editor"
                  android:hasCode="false">

                  <activity
                      android:name="android.app.NativeActivity"
                      android:label="SIN Editor"
                      android:screenOrientation="landscape"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:exported="true">

                      <meta-data
                          android:name="android.app.lib_name"
                          android:value="sin_editor" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

      - name: Package APK with aapt2
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          PLATFORM="$ANDROID_SDK_ROOT/platforms/android-${{ env.COMPILE_SDK }}"

          mkdir -p apk-staging/res
          $BUILD_TOOLS/aapt2 compile --dir apk-staging/res -o compiled_res.zip || true

          $BUILD_TOOLS/aapt2 link \
              -o sin_editor_unsigned.apk \
              --manifest apk-staging/AndroidManifest.xml \
              -I "$PLATFORM/android.jar" \
              --min-sdk-version ${{ env.MIN_SDK }} \
              --target-sdk-version ${{ env.COMPILE_SDK }} \
              --version-code 1 \
              --version-name "0.2"

          cd apk-staging
          zip -r ../sin_editor_unsigned.apk lib/
          cd ..

      - name: Align APK
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          $BUILD_TOOLS/zipalign -v 4 sin_editor_unsigned.apk sin_editor_aligned.apk

      - name: Sign APK with debug key
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"

          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

          $BUILD_TOOLS/apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out sin_editor_debug.apk \
            sin_editor_aligned.apk

      - name: Verify APK
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          $BUILD_TOOLS/apksigner verify --verbose sin_editor_debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sin_editor-android-arm64
          path: sin_editor_debug.apk
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
#  Release — bundle all artifacts
# ─────────────────────────────────────────────────────────────────────────────
  release-bundle:
    name: Release Bundle
    runs-on: ubuntu-22.04
    needs:
      - build-linux
      - build-windows
      - build-android
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List dist contents
        run: find dist/ -type f | sort

      - name: Create release archive
        run: |
          cd dist
          zip -r ../sin_editor_release_${{ github.sha }}.zip .

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: sin_editor-release-${{ github.sha }}
          path: sin_editor_release_${{ github.sha }}.zip
          retention-days: 90
